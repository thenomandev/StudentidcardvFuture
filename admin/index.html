<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin CMS</title>
<link rel="stylesheet" href="../css/admin.css">
</head>
<body style="display:none;">

<div class="container">
<h1>Student ID CMS Admin</h1>

<div class="college-dropdown-box">

<input
type="text"
id="collegeSelect"
placeholder="Select College"
autocomplete="off"
onclick="toggleAdminDropdown()"
oninput="filterAdminCollegeList()"
>

<div id="adminCollegeDropdown" class="college-dropdown"></div>

</div>

<button class="loadBtn" onclick="loadCollege()">Load College</button>
<button class="deleteBtn" onclick="deleteCollege()">Delete College</button>
<button class="logoutBtn" onclick="logout()">Logout</button>

<h3>College Details</h3>

<input id="collegeNameBn" placeholder="College Name Bangla">
<input id="collegeNameEn" placeholder="College Name English">
<input id="established" placeholder="Established">
<div class="upload-section">

<h4>Transparent Logo</h4>
<div class="upload-box">
<input type="file" id="transparentLogoFile" accept=".png,.jpg,.jpeg,.webp">
<progress id="transparentLogoProgress" value="0" max="100"></progress>
<img id="transparentLogoPreview" class="upload-preview" style="display:none;">
<input id="transparentLogo" type="hidden">
<button type="button" class="deleteBtn" onclick="deleteUploadedImage('transparentLogo')">Delete Image</button>
</div>

<h4>White Box Logo</h4>
<div class="upload-box">
<input type="file" id="whiteLogoFile" accept=".png,.jpg,.jpeg,.webp">
<progress id="whiteLogoProgress" value="0" max="100"></progress>
<img id="whiteLogoPreview" class="upload-preview" style="display:none;">
<input id="whiteLogo" type="hidden">
<button type="button" class="deleteBtn" onclick="deleteUploadedImage('whiteLogo')">Delete Image</button>
</div>

<h4>Principal Signature</h4>
<div class="upload-box">
<input type="file" id="principalSignatureFile" accept=".png,.jpg,.jpeg,.webp">
<progress id="principalSignatureProgress" value="0" max="100"></progress>
<img id="principalSignaturePreview" class="upload-preview" style="display:none;">
<input id="principalSignature" type="hidden">
<button type="button" class="deleteBtn" onclick="deleteUploadedImage('principalSignature')">Delete Image</button>
</div>

<h4>Watermark / Background</h4>
<div class="upload-box">
<input type="file" id="watermarkFile" accept=".png,.jpg,.jpeg,.webp">
<progress id="watermarkProgress" value="0" max="100"></progress>
<img id="watermarkPreview" class="upload-preview" style="display:none;">
<input id="watermark" type="hidden">
<button type="button" class="deleteBtn" onclick="deleteUploadedImage('watermark')">Delete Image</button>
</div>

</div>
<input id="website" placeholder="Website">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button class="saveBtn" onclick="saveCollege()">Save Changes</button>

<h3>Add New College</h3>

<input id="newCollegeId" placeholder="college id (example: govt_college)">
<input id="newCollegeName" placeholder="college display name">

<button class="saveBtn" onclick="addCollege()">Add College</button>

</div>

<script type="module" src="../js/admin/admin.js"></script>
<script src="../js/admin/dark-mode-admin.js"></script>

</body>
</html>
