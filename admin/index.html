<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin CMS</title>
<link rel="stylesheet" href="../css/admin.css">
</head>
<body style="display:none;">

<div class="container">
<h1>Student ID CMS Admin</h1>

<div class="college-dropdown-box">

<input
type="search"
id="collegeSelect"
placeholder="Select College"
autocomplete="off"
onclick="toggleAdminDropdown()"
oninput="filterAdminCollegeList()"
>

<div id="adminCollegeDropdown" class="college-dropdown"></div>

</div>

<button class="loadBtn" onclick="loadCollege()">Load College</button>
<button class="deleteBtn" onclick="deleteCollege()">Delete College</button>
<button class="logoutBtn" onclick="logout()">Logout</button>

<h3>College Details</h3>

<input id="collegeNameBn" placeholder="College Name Bangla">
<input id="collegeNameEn" placeholder="College Name English">
<input id="established" placeholder="Established">
<div class="upload-section">
<div class="upload-grid">

<div class="upload-card" data-field="transparentLogo">
<h4>Transparent Logo</h4>

<label class="upload-drop" for="transparentLogoFile">
<div class="upload-icon">🖼</div>
<div class="upload-title">Tap to Upload</div>
<div class="upload-sub">PNG / JPG / WebP • Max 5MB</div>
</label>

<input type="file" id="transparentLogoFile" accept=".png,.jpg,.jpeg,.webp" style="display:none;">

<progress id="transparentLogoProgress" value="0" max="100"></progress>

<img id="transparentLogoPreview" class="upload-preview">

<div class="upload-actions">
<button type="button" class="replaceBtn" onclick="triggerUpload('transparentLogo')">Replace</button>
<button type="button" class="removeBtn" onclick="deleteUploadedImage('transparentLogo')">Remove</button>
</div>

<input id="transparentLogo" type="hidden">
</div>


<div class="upload-card" data-field="whiteLogo">
<h4>White Box Logo</h4>

<label class="upload-drop" for="whiteLogoFile">
<div class="upload-icon">🖼</div>
<div class="upload-title">Tap to Upload</div>
<div class="upload-sub">PNG / JPG / WebP • Max 5MB</div>
</label>

<input type="file" id="whiteLogoFile" accept=".png,.jpg,.jpeg,.webp" style="display:none;">

<progress id="whiteLogoProgress" value="0" max="100"></progress>

<img id="whiteLogoPreview" class="upload-preview">

<div class="upload-actions">
<button type="button" class="replaceBtn" onclick="triggerUpload('whiteLogo')">Replace</button>
<button type="button" class="removeBtn" onclick="deleteUploadedImage('whiteLogo')">Remove</button>
</div>

<input id="whiteLogo" type="hidden">
</div>


<div class="upload-card" data-field="principalSignature">
<h4>Principal Signature</h4>

<label class="upload-drop" for="principalSignatureFile">
<div class="upload-icon">✍️</div>
<div class="upload-title">Tap to Upload</div>
<div class="upload-sub">PNG / JPG / WebP • Max 5MB</div>
</label>

<input type="file" id="principalSignatureFile" accept=".png,.jpg,.jpeg,.webp" style="display:none;">

<progress id="principalSignatureProgress" value="0" max="100"></progress>

<img id="principalSignaturePreview" class="upload-preview">

<div class="upload-actions">
<button type="button" class="replaceBtn" onclick="triggerUpload('principalSignature')">Replace</button>
<button type="button" class="removeBtn" onclick="deleteUploadedImage('principalSignature')">Remove</button>
</div>

<input id="principalSignature" type="hidden">
</div>


<div class="upload-card" data-field="watermark">
<h4>Watermark / Background</h4>

<label class="upload-drop" for="watermarkFile">
<div class="upload-icon">🎨</div>
<div class="upload-title">Tap to Upload</div>
<div class="upload-sub">PNG / JPG / WebP • Max 5MB</div>
</label>

<input type="file" id="watermarkFile" accept=".png,.jpg,.jpeg,.webp" style="display:none;">

<progress id="watermarkProgress" value="0" max="100"></progress>

<img id="watermarkPreview" class="upload-preview">

<div class="upload-actions">
<button type="button" class="replaceBtn" onclick="triggerUpload('watermark')">Replace</button>
<button type="button" class="removeBtn" onclick="deleteUploadedImage('watermark')">Remove</button>
</div>

<input id="watermark" type="hidden">
</div>

</div>
</div>
<input id="website" placeholder="Website">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">

<button class="saveBtn" onclick="saveCollege()">Save Changes</button>

<h3>Add New College</h3>

<input id="newCollegeId" placeholder="college id (example: govt_college)">
<input id="newCollegeName" placeholder="college display name">

<button class="saveBtn" onclick="addCollege()">Add College</button>

</div>

<script type="module" src="../js/admin/admin.js"></script>
<script src="../js/admin/dark-mode-admin.js"></script>

</body>
</html>
